name: Application Flow

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]

jobs:
  ask-for-pr:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Comment with PR instructions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const candidate = issue.user.login;
            const commentBody = `Hi @${candidate} — thanks for applying! Please add your profile by opening a pull request that adds a JSON file with your profile under profile-submission.json. In your PR description include "resolves: #${issue.number}" or "closes: #${issue.number}" so we can link it to this application. Once your PR is merged we'll reopen this issue and ask you to proceed with the trial task.`;
            await github.rest.issues.createComment({ 
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: commentBody
            });
            try {
              await github.rest.issues.addLabels({ ...context.repo, issue_number: issue.number, labels: ['job-application'] });
            } catch (e) {
              console.log('Could not add label:', e.message);
            }

  reopen-issue:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reopen linked issues and ask to proceed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const regex = new RegExp(
              `(?:resolves|closes):?\\s*(?:#(\\d+)|https:\\/\\/github\\.com\\/${owner}\\/${repo}\\/issues\\/(\\d+))`,
              'gi'
            );
            const matches = [...prBody.matchAll(regex)];

            // Extract the numbers and remove duplicates
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1] || m[2], 10)))];

            for (const issue_number of issueNumbers) {
              try {
                // The actual command to reopen
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue_number,
                  state: 'open'
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue_number,
                  body: `Hi @${context.payload.pull_request.user.login} — your profile PR was merged. Please proceed with the trial task.`
                 });
              } catch (error) {
                console.log(`Could not reopen issue #${issue_number}: ${error.message}`);
              }
            }
